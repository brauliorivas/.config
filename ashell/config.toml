log_level = "warn"
outputs = { Targets = ["eDP-1"] }
position = "Top"

[modules]
left = [ "Workspaces" ]
center = [ "WindowTitle" ]
right = [ "SystemInfo", [  "Tray", "Clock", "Privacy", "Settings" ] ]

[workspaces]
enable_workspace_filling = true

[window_title]
truncate_title_after_length = 100

[settings]
indicators = ["IdleInhibitor", "PowerProfile", "Audio", "Bluetooth", "Network", "Vpn", "Battery"]
wifi_more_cmd = "nm-connection-editor"
vpn_more_cmd = "nm-connection-editor"
battery_format = "IconAndPercentage"
peripheral_battery_format = "Icon"

[appearance]
style = "Islands"

primary_color = "#7aa2f7"
success_color = "#9ece6a"
text_color = "#a9b1d6"
workspace_colors = [ "#7aa2f7", "#9ece6a" ]
special_workspace_colors = [ "#7aa2f7", "#9ece6a" ]

[appearance.danger_color]
base = "#f7768e"
weak = "#e0af68"

[appearance.background_color]
base = "#1a1b26"
weak = "#24273a"
strong = "#414868"

[appearance.secondary_color]
base = "#0c0d14"
